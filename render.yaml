services:
  - type: web
    name: nlp-search-engine-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

  - type: web
    name: nlp-search-engine-ui
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run ui/streamlit_app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true
